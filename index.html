document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"{{ clip.onToggleDesc }}\" style=\"background:none;border:none;color:#1FB4FF;font-size:11px;font-weight:700;cursor:pointer;padding:0;font-family:'Manrope',sans-serif;white-space:nowrap;\">Thu gọn ↑<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <!-- Vote row -->\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;\">\n          <!-- Already voted -->\n          <sc-if value=\"{{ clip.voted }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ clip.onVote }}\" style=\"display:flex;align-items:center;gap:8px;background:rgba(255,107,138,0.14);border:1.5px solid rgba(255,107,138,0.6);border-radius:40px;padding:8px 18px;color:#FF6B8A;font-size:13px;font-weight:600;cursor:pointer;font-family:'Manrope',sans-serif;transition:all 0.2s;\" style-hover=\"background:rgba(255,107,138,0.24);\">\n              <span style=\"font-size:16px;display:inline-block;animation:pop 0.4s ease;\">❤️<\u002Fspan>\n              <span>Đã bình chọn<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-if>\n          <!-- Not yet voted -->\n          <sc-if value=\"{{ clip.notVoted }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onclick=\"{{ clip.onVote }}\" style=\"display:flex;align-items:center;gap:8px;background:none;border:1.5px solid rgba(255,255,255,0.15);border-radius:40px;padding:8px 18px;color:rgba(255,255,255,0.55);font-size:13px;font-weight:600;cursor:pointer;font-family:'Manrope',sans-serif;transition:all 0.2s;\" style-hover=\"border-color:rgba(255,107,138,0.5);color:#FF6B8A;\">\n              <span style=\"font-size:16px;\">🤍<\u002Fspan>\n              <span>Bình chọn<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n<\u002Fdiv>\n\n<!-- ── FOOTER ─────────────────────────────────────────────────── -->\n<p style=\"margin:32px 48px 0;font-size:11px;color:rgba(255,255,255,0.18);text-align:center;\">Kết quả chính thức được tổng hợp từ Microsoft Forms · Mỗi người chỉ 1 lượt vote.<\u002Fp>\n\n<!-- ── VIDEO MODAL ───────────────────────────────────────────── -->\n<sc-if value=\"{{ showVideoModal }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;background:rgba(0,5,18,0.92);backdrop-filter:blur(20px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;\" onclick=\"{{ handleVideoBackdrop }}\">\n    <div onclick=\"{{ stopVideoPropagation }}\" style=\"max-width:780px;width:100%;background:linear-gradient(160deg,#071828 0%,#0a2340 100%);border:1px solid rgba(255,255,255,0.12);border-radius:24px;overflow:hidden;animation:slideUp 0.28s ease both;box-shadow:0 40px 80px rgba(0,0,0,0.7);\">\n      <!-- Modal header -->\n      <div style=\"padding:18px 22px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <span style=\"font-size:22px;\">{{ videoEmoji }}<\u002Fspan>\n          <div>\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#1FB4FF;margin-bottom:2px;\">{{ videoTeam }}<\u002Fdiv>\n            <div style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:500;\">{{ videoTitle }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeVideo }}\" style=\"width:34px;height:34px;background:rgba(255,255,255,0.07);border:none;border-radius:9px;cursor:pointer;color:rgba(255,255,255,0.6);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Manrope',sans-serif;transition:background 0.15s;\" style-hover=\"background:rgba(255,255,255,0.14);color:#fff;\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <!-- Video area -->\n      <sc-if value=\"{{ hasVideoUrl }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"aspect-ratio:16/9;background:#000;\">\n          <iframe src=\"{{ videoEmbedUrl }}\" width=\"100%\" height=\"100%\" style=\"border:none;display:block;\" allowfullscreen=\"true\" title=\"{{ videoTitle }}\"><\u002Fiframe>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ hasNoVideoUrl }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"aspect-ratio:16/9;background:linear-gradient(135deg,rgba(0,125,187,0.2),rgba(0,17,42,0.9));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;\">\n          <div style=\"font-size:56px;opacity:0.5;\">{{ videoEmoji }}<\u002Fdiv>\n          <div style=\"text-align:center;\">\n            <div style=\"font-size:14px;font-weight:700;margin-bottom:6px;\">Chưa có link video<\u002Fdiv>\n            <div style=\"font-size:12px;color:rgba(255,255,255,0.4);line-height:1.6;\">Admin cần điền <code style=\"background:rgba(255,255,255,0.08);padding:2px 7px;border-radius:5px;\">streamUrl<\u002Fcode> trong CLIPS<br>Hỗ trợ: Microsoft Stream, SharePoint, YouTube embed<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ── VOTE MODAL ─────────────────────────────────────────────── -->\n<sc-if value=\"{{ showModal }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;background:rgba(0,5,18,0.88);backdrop-filter:blur(18px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;\" onclick=\"{{ handleBackdropClick }}\">\n    <div onclick=\"{{ stopPropagation }}\" style=\"max-width:620px;width:100%;background:linear-gradient(160deg,#071828 0%,#0a2340 100%);border:1px solid rgba(255,255,255,0.12);border-radius:24px;overflow:hidden;animation:slideUp 0.3s ease both;box-shadow:0 40px 80px rgba(0,0,0,0.6);\">\n      <!-- Modal header -->\n      <div style=\"padding:20px 24px 18px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:12px;\">\n          <div style=\"font-size:28px;line-height:1;\">{{ modalEmoji }}<\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#1FB4FF;margin-bottom:3px;\">Bình chọn<\u002Fdiv>\n            <div style=\"font-family:'Syne',sans-serif;font-size:18px;font-weight:500;\">{{ modalTeam }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeModal }}\" style=\"width:34px;height:34px;background:rgba(255,255,255,0.07);border:none;border-radius:9px;cursor:pointer;color:rgba(255,255,255,0.6);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Manrope',sans-serif;transition:background 0.15s;\" style-hover=\"background:rgba(255,255,255,0.14);color:#fff;\">✕<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- Form area -->\n      <sc-if value=\"{{ hasFormUrl }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:28px 28px 20px;text-align:center;\">\n          <div style=\"font-size:36px;margin-bottom:16px;\">📋<\u002Fdiv>\n          <div style=\"font-family:'Syne',sans-serif;font-size:18px;font-weight:500;margin-bottom:10px;\">Mở Microsoft Form để vote<\u002Fdiv>\n          <div style=\"font-size:13px;color:rgba(255,255,255,0.45);line-height:1.7;margin-bottom:24px;\">\n            Form sẽ mở trong tab mới · Đăng nhập M365 · Bấm <b style=\"color:rgba(255,255,255,0.7);\">Submit<\u002Fb><br>Xong quay lại đây bấm <b style=\"color:#FF6B8A;\">Xác nhận vote ❤️<\u002Fb>\n          <\u002Fdiv>\n          <a href=\"{{ modalFormUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:10px;background:rgba(31,180,255,0.15);border:1.5px solid rgba(31,180,255,0.45);border-radius:12px;padding:13px 28px;color:#1FB4FF;font-size:14px;font-weight:700;text-decoration:none;font-family:'Manrope',sans-serif;transition:all 0.2s;\" style-hover=\"background:rgba(31,180,255,0.25);border-color:#1FB4FF;\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z\"><\u002Fpath><\u002Fsvg>\n            Mở Form để bình chọn\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- No form URL placeholder -->\n      <sc-if value=\"{{ hasNoFormUrl }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:40px 32px;text-align:center;\">\n          <div style=\"font-size:36px;margin-bottom:16px;\">📋<\u002Fdiv>\n          <div style=\"font-size:15px;font-weight:700;margin-bottom:8px;\">Chưa có link Microsoft Form<\u002Fdiv>\n          <div style=\"font-size:13px;color:rgba(255,255,255,0.45);line-height:1.65;margin-bottom:24px;\">Admin cần tạo Microsoft Form và paste link vào<br>trường <code style=\"background:rgba(255,255,255,0.08);padding:2px 7px;border-radius:5px;\">formUrl<\u002Fcode> của clip này trong CLIPS.<\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 18px;text-align:left;font-size:12px;font-family:monospace;color:#C0E7FF;line-height:2;\">\n            <span style=\"color:rgba(255,255,255,0.35);\">// Ví dụ:<\u002Fspan><br>\n            { id:1, team:'Team Alpha', ...,<br>\n            &nbsp;&nbsp;formUrl: <span style=\"color:#FFAA00\">'https://forms.office.com/...'<\u002Fspan> }\n          <\u002Fdiv>\n          <div style=\"margin-top:20px;font-size:12px;color:rgba(255,255,255,0.35);\">Tip: Dùng 1 form chung → để formUrl null và điền CONFIG.sharedFormUrl<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Confirm / close actions -->\n      <div style=\"padding:16px 20px 20px;border-top:1px solid rgba(255,255,255,0.07);display:flex;gap:10px;align-items:center;\">\n        <button onclick=\"{{ confirmVote }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,rgba(255,107,138,0.22),rgba(255,60,100,0.16));border:1.5px solid rgba(255,107,138,0.5);border-radius:12px;padding:13px 20px;color:#FF6B8A;font-size:14px;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;transition:all 0.2s;\" style-hover=\"background:linear-gradient(135deg,rgba(255,107,138,0.32),rgba(255,60,100,0.24));border-color:rgba(255,107,138,0.8);\">\n          <span style=\"font-size:18px;\">❤️<\u002Fspan>\n          Tôi đã submit form → Xác nhận vote\n        <\u002Fbutton>\n        <button onclick=\"{{ closeModal }}\" style=\"background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 18px;color:rgba(255,255,255,0.45);font-size:13px;font-weight:600;cursor:pointer;font-family:'Manrope',sans-serif;white-space:nowrap;transition:all 0.2s;\" style-hover=\"background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);\">Đóng<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ── TOAST ──────────────────────────────────────────────────── -->\n<div style=\"{{ toastStyle }}\">{{ toastMsg }}<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  // ═══════════════════════════════════════════════════════════\n  // 📝 ADMIN CONFIG — điền thông tin vào đây\n  // ═══════════════════════════════════════════════════════════\n  CONFIG = {\n    // Nếu dùng 1 form chung cho tất cả → paste link vào đây\n    // Nếu mỗi clip có form riêng → để null và điền formUrl trong CLIPS\n    sharedFormUrl: 'https://forms.office.com/Pages/ResponsePage.aspx?id=gsei-EfeB0O2kL7hNsRHkCUYLL_k9N9NnFS2KfV6wIZUQlkxT0JDN0VOUUlZSzEyOVFXS0JZUFc1ViQlQCN0PWcu',\n\n    // Cho phép đổi vote sau khi đã submit? (true nếu Forms cho phép edit)\n    allowVoteChange: false,\n  };\n\n  // ═══════════════════════════════════════════════════════════\n  // 📹 CLIPS — cập nhật tên team, tiêu đề, link Stream & Form\n  // ═══════════════════════════════════════════════════════════\n  CLIPS = [\n    { id:1, team:'Phi Nguyen',    title:\"From Two Hearts to Three – Mon (Minh Kha)'s Growing Up Journey\", desc:'From the moment we discovered you were on the way, our lives changed forever. From tiny kicks in mommy\\'s belly to your first smiles, every moment has been a beautiful chapter of our story. ❤️', emoji:'☕',  streamUrl:'https://tcapc.sharepoint.com/sites/vietnampeopleteam/_layouts/15/embed.aspx?UniqueId=80e367e7-8a81-4954-9110-d74898085a2e&embed=%7B%22ust%22%3Atrue%2C%22hv%22%3A%22CopyEmbedCode%22%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create', formUrl:null },\n    { id:2, team:'Tiffany Tieu',  title:'Summer Day 2026',                  desc:'Summer 2026 ☀️ | We Are Family ❤️ — Together is our favorite place to be. Creating memories that will last forever. ✨', emoji:'☀️', streamUrl:'https://tcapc.sharepoint.com/sites/vietnampeopleteam/_layouts/15/embed.aspx?UniqueId=d7dca3de-6f69-4273-b798-4857bf026f99&embed=%7B%22ust%22%3Atrue%2C%22hv%22%3A%22CopyEmbedCode%22%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create', formUrl:null },\n    { id:3, team:'Hieu Nguyen',   title:\"Hieu Q Nguyen's Family\",           desc:'No matter how busy we are with work or how many worries life brings, the happiest place is still home and family. Cherish your family, and don\\'t forget to love and take care of yourself as well.', emoji:'👨‍👩‍👧', streamUrl:'https://tcapc.sharepoint.com/sites/vietnampeopleteam/_layouts/15/embed.aspx?UniqueId=3a7356b8-8529-4220-95b1-ce41135d7c8b&embed=%7B%22ust%22%3Atrue%2C%22hv%22%3A%22CopyEmbedCode%22%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create', formUrl:null },\n    { id:4, team:'Thuan Vo',      title:'Hành trình xây dựng tổ ấm',       desc:'Clip khắc họa hành trình cả gia đình cùng nhau xây dựng mái nhà chung. Mỗi giai đoạn gắn liền với một kỷ niệm, một ký ức nhỏ bé nhưng đầy yêu thương. Ngôi nhà không chỉ là nơi trú ngụ, mà còn là nơi để trở về, nơi lưu giữ hạnh phúc và tình thân.', emoji:'🏡', streamUrl:'https://tcapc.sharepoint.com/sites/vietnampeopleteam/_layouts/15/embed.aspx?UniqueId=924f7330-dde8-432a-8fc6-0e6ad417b21b&embed=%7B%22ust%22%3Atrue%2C%22hv%22%3A%22CopyEmbedCode%22%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create', formUrl:null },\n    { id:5, team:'Vicky Tran',    title:'Not By Blood, but By Heart ❤️',   desc:'This video captures the laughter, memories, and little moments that brought us closer. Somewhere along the way, these friends have become my 2nd family.', emoji:'💝', streamUrl:'https://tcapc.sharepoint.com/sites/vietnampeopleteam/_layouts/15/embed.aspx?UniqueId=af9c9d4b-cca0-44f7-a0c8-907fa892d043&embed=%7B%22ust%22%3Atrue%2C%22hv%22%3A%22CopyEmbedCode%22%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create', formUrl:null },\n    { id:6, team:'Daniel Nguyen', title:'My second family',                 desc:\"For me, university friends are not just classmates; they are my second family — a sanctuary of warmth and support during the defining years of stepping into independent life. They are the ones who pull all-nighters running deadlines with you, share instant noodles when everyone is broke, and embrace your flaws without judgment. While childhood friendships are built on innocence, university bonds are forged in maturity and shared growth. Even as we graduate and chase our own paths, this second family remains my most cherished safe haven, a beautiful reminder that I never had to face the world alone.\", emoji:'👨‍👩‍👦‍👦', streamUrl:'https://tcapc.sharepoint.com/sites/vietnampeopleteam/_layouts/15/embed.aspx?UniqueId=aa673551-3b95-4bd9-b560-06d7bed83754&embed=%7B%22ust%22%3Atrue%2C%22hv%22%3A%22CopyEmbedCode%22%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create', formUrl:null },\n  ];\n\n  _toastTimer = null;\n\n  TRUNCATE_AT = 140;\n\n  state = {\n    votes:         JSON.parse(localStorage.getItem('tc_votes_2025') || '{}'),\n    myVoteId:      parseInt(localStorage.getItem('tc_my_vote_2025')) || null,\n    activeClipId:  null,\n    activeVideoId: null,\n    expandedDescs: {},\n    toastMsg:      '',\n    toastVisible:  false,\n  };\n\n  toggleDesc(clipId) {\n    this.setState(s => ({\n      expandedDescs: { ...s.expandedDescs, [clipId]: !s.expandedDescs[clipId] }\n    }));\n  }\n\n  openVideo(clipId) {\n    this.setState({ activeVideoId: clipId });\n  }\n\n  closeVideo() {\n    this.setState({ activeVideoId: null });\n  }\n\n  openVote(clipId) {\n    const { myVoteId } = this.state;\n    if (myVoteId === clipId) {\n      this.showToast('❤️ Bạn đã bình chọn cho clip này rồi!');\n      return;\n    }\n    if (myVoteId && !this.CONFIG.allowVoteChange) {\n      this.showToast('Bạn đã vote rồi. Không thể thay đổi.');\n      return;\n    }\n    this.setState({ activeClipId: clipId });\n  }\n\n  confirmVote() {\n    const { activeClipId: clipId, votes, myVoteId } = this.state;\n    if (!clipId) return;\n    const nv = { ...votes };\n    if (myVoteId && myVoteId !== clipId) {\n      nv[myVoteId] = Math.max(0, (nv[myVoteId] || 0) - 1);\n    }\n    if (myVoteId !== clipId) {\n      nv[clipId] = (nv[clipId] || 0) + 1;\n    }\n    localStorage.setItem('tc_votes_2025', JSON.stringify(nv));\n    localStorage.setItem('tc_my_vote_2025', String(clipId));\n    this.setState({ votes: nv, myVoteId: clipId, activeClipId: null });\n    this.showToast('❤️ Cảm ơn bạn đã bình chọn!');\n  }\n\n  closeModal() {\n    this.setState({ activeClipId: null });\n  }\n\n  showToast(msg) {\n    clearTimeout(this._toastTimer);\n    this.setState({ toastMsg: msg, toastVisible: true });\n    this._toastTimer = setTimeout(() => this.setState({ toastVisible: false }), 2500);\n  }\n\n  renderVals() {\n    const { votes, myVoteId, activeClipId, activeVideoId, toastMsg, toastVisible } = this.state;\n\n    // Scoreboard — all 6\n    const sorted = [...this.CLIPS].sort((a, b) => (votes[b.id] || 0) - (votes[a.id] || 0));\n    const top3 = sorted.map(c => ({ ...c, count: votes[c.id] || 0 }));\n\n    // Clips\n    const { expandedDescs } = this.state;\n    const clips = this.CLIPS.map(c => {\n      const isLong     = c.desc && c.desc.length > this.TRUNCATE_AT;\n      const isExpanded = !!expandedDescs[c.id];\n      const shortDesc  = isLong ? c.desc.slice(0, this.TRUNCATE_AT).trimEnd() + '…' : c.desc;\n      return {\n        ...c,\n        voted:        myVoteId === c.id,\n        notVoted:     myVoteId !== c.id,\n        onVote:       () => this.openVote(c.id),\n        onPlay:       () => this.openVideo(c.id),\n\n        noThumbnail:  !c.streamUrl,\n        thumbStyle: c.streamUrl ? (() => {\n          const m = c.streamUrl.match(/UniqueId=([^&]+)/);\n          const url = m ? `https://tcapc.sharepoint.com/sites/vietnampeopleteam/_layouts/15/getpreview.ashx?guidFile=${m[1]}&resolution=6` : null;\n          return url ? { position:'absolute', inset:0, width:'100%', height:'100%', backgroundImage:`url(${url})`, backgroundSize:'cover', backgroundPosition:'center' } : null;\n        })() : null,\n        displayDesc:  isLong && !isExpanded ? shortDesc : c.desc,\n        isLong,\n        isExpanded,\n        showExpanded: isLong && isExpanded,\n        showCollapsed: isLong && !isExpanded,\n        onToggleDesc: () => this.toggleDesc(c.id),\n      };\n    });\n\n    // Video modal data\n    const activeVideo     = activeVideoId ? this.CLIPS.find(c => c.id === activeVideoId) : null;\n    const videoEmbedUrl   = activeVideo ? activeVideo.streamUrl : null;\n    const hasVideoUrl     = !!videoEmbedUrl;\n\n    // Vote modal data\n    const activeClip   = activeClipId ? this.CLIPS.find(c => c.id === activeClipId) : null;\n    const modalFormUrl = activeClip\n      ? (activeClip.formUrl || this.CONFIG.sharedFormUrl || '')\n      : '';\n    const hasFormUrl   = !!modalFormUrl;\n\n    // Header voted state\n    const votedClip = myVoteId ? this.CLIPS.find(c => c.id === myVoteId) : null;\n\n    // Toast style (dynamic transform)\n    const toastStyle = {\n      position: 'fixed', bottom: '28px', left: '50%',\n      transform: `translateX(-50%) translateY(${toastVisible ? '0' : '80px'})`,\n      background: 'rgba(31,180,255,0.15)', backdropFilter: 'blur(14px)',\n      border: '1px solid rgba(31,180,255,0.4)', borderRadius: '40px',\n      padding: '11px 24px', fontSize: '13px', fontWeight: '600', color: '#fff',\n      transition: 'transform 0.3s ease', zIndex: 999, whiteSpace: 'nowrap',\n      pointerEvents: 'none',\n    };\n\n    return {\n      top3,\n      clips,\n      hasVoted:          !!myVoteId,\n      votedTeam:         votedClip ? votedClip.team : '',\n      showModal:         !!activeClipId,\n      modalTeam:         activeClip ? activeClip.team : '',\n      modalEmoji:        activeClip ? activeClip.emoji : '',\n      modalFormUrl,\n      hasFormUrl,\n      hasNoFormUrl:      !hasFormUrl,\n      showVideoModal:      !!activeVideoId,\n      videoTeam:           activeVideo ? activeVideo.team : '',\n      videoTitle:          activeVideo ? activeVideo.title : '',\n      videoEmoji:          activeVideo ? activeVideo.emoji : '',\n      videoEmbedUrl,\n      hasVideoUrl,\n      hasNoVideoUrl:       !hasVideoUrl,\n      closeVideo:          () => this.closeVideo(),\n      handleVideoBackdrop: () => this.closeVideo(),\n      stopVideoPropagation:(e) => e.stopPropagation(),\n      confirmVote:         () => this.confirmVote(),\n      closeModal:          () => this.closeModal(),\n      handleBackdropClick: () => this.closeModal(),\n      stopPropagation:     (e) => e.stopPropagation(),\n      toastMsg,\n      toastStyle,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
